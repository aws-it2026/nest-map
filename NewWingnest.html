<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Wing Nest Airspace Platform</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <!-- Mapbox & Search Bar Libraries -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="https://api.mapbox.com/search-js/v1.0.0-beta.18/web.js"></script>
    <!-- Turf.js for 6-mile math -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <!-- PapaParse for Google Sheet CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100vh; }
        .legend { background: rgba(255, 255, 255, 0.95); padding: 15px; position: absolute; bottom: 30px; left: 10px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.3); z-index: 1; font-family: sans-serif; }
        .legend div { margin-bottom: 8px; font-size: 13px; font-weight: bold; display: flex; align-items: center; }
        .dot { height: 12px; width: 12px; display: inline-block; border-radius: 50%; margin-right: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="legend">
    <div style="font-size: 15px; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 10px;">Wing Nest Status</div>
    <div><span class="dot" style="background: #2ecc71;"></span> Active Nest</div>
    <div><span class="dot" style="background: #3498db;"></span> Scheduled Nest</div>
    <div><span class="dot" style="background: #e74c3c;"></span> FAA Conflict (Airport/Heliport)</div>
    <div style="font-weight: normal; font-size: 11px; color: #666; margin-top: 5px;">Click a Nest to see 6-mile radius</div>
</div>

<script>
    const ACCESS_TOKEN = 'pk.eyJ1Ijoiam1hdGxiMTcyIiwiYSI6ImNtbWI3NG14ZDBtc20ycG9sZGVwZWhsZmYifQ.NBMR1a8v6ADtwFlTNZlgJw';
    mapboxgl.accessToken = ACCESS_TOKEN;

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/satellite-streets-v12',
        center: [-84.3880, 33.7490], // Starting near Atlanta
        zoom: 9
    });

    // --- ADD THE SEARCH BAR ---
    const searchBox = new MapboxSearchBox();
    searchBox.accessToken = ACCESS_TOKEN;
    searchBox.mapboxgl = mapboxgl;
    map.addControl(searchBox, 'top-left');

    // YOUR NEW GOOGLE SHEET LINK
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRli04gPcnTL6awSpf8_X4HXptT6YO-YkKUO7ewOSkgeyT5HbH3OD3rFd7geSfHIQ/pub?output=csv';

    map.on('load', () => {
        // --- FAA AIRPORTS & HELIPORTS LAYER ---
        map.addSource('faa-facilities', {
            type: 'geojson',
            data: 'https://services6.arcgis.com/ssUayPoYpobmXvAe/arcgis/rest/services/US_Airport_Facilities/FeatureServer/0/query?outFields=*&where=1%3D1&f=geojson'
        });

        map.addLayer({
            'id': 'faa-layer',
            'type': 'circle',
            'source': 'faa-facilities',
            'paint': {
                'circle-radius': 5,
                'circle-color': '#e74c3c',
                'circle-stroke-width': 1.5,
                'circle-stroke-color': '#fff'
            }
        });

        // --- GOOGLE SHEETS NEST LAYER ---
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                const nests = results.data;
                const bounds = new mapboxgl.LngLatBounds();

                nests.forEach(nest => {
                    // Extracting based on your latest headers
                    const lat = parseFloat(nest.Latitude); 
                    const lng = parseFloat(nest.Longitude);
                    const name = nest.Nest_Name || "Unnamed Nest";

                    if (isNaN(lat) || isNaN(lng)) return;

                    bounds.extend([lng, lat]);

                    // Visual Marker
                    const el = document.createElement('div');
                    el.style.width = '18px';
                    el.style.height = '18px';
                    el.style.borderRadius = '50%';
                    el.style.backgroundColor = nest.Status === 'Active' ? '#2ecc71' : '#3498db';
                    el.style.border = '3px solid white';
                    el.style.boxShadow = '0 0 10px rgba(0,0,0,0.5)';
                    el.style.cursor = 'pointer';

                    new mapboxgl.Marker(el)
                        .setLngLat([lng, lat])
                        .addTo(map);

                    el.addEventListener('click', () => {
                        drawConflictZone([lng, lat], name);
                    });
                });

                // Zoom to fit your nests automatically
                if (!bounds.isEmpty()) {
                    map.fitBounds(bounds, { padding: 80 });
                }
            }
        });
    });

    // --- 6-MILE RADIUS LOGIC ---
    function drawConflictZone(coords, name) {
        if (map.getLayer('circle-fill')) {
            map.removeLayer('circle-fill');
            map.removeSource('circle-source');
        }
        const circle = turf.circle(coords, 6, {units: 'miles'});
        map.addSource('circle-source', { 'type': 'geojson', 'data': circle });
        map.addLayer({
            'id': 'circle-fill',
            'type': 'fill',
            'source': 'circle-source',
            'paint': { 'fill-color': '#f1c40f', 'fill-opacity': 0.3 }
        });
        new mapboxgl.Popup().setLngLat(coords).setHTML(`<strong>${name}</strong><br>6-mile scan area`).addTo(map);
        map.flyTo({ center: coords, zoom: 11 });
    }
</script>

</body>
</html>
