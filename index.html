<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Wing Nest Airspace Platform</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, Helvetica, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        #sidebar { width: 320px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 2; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .sidebar-header { padding: 20px; background: #2c3e50; color: white; }
        .sidebar-content { flex-grow: 1; overflow-y: auto; padding: 15px; }
        
        /* Map Styles */
        #map { flex-grow: 1; position: relative; }
        
        /* UI Elements */
        .filter-group { margin-bottom: 20px; }
        select { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
        
        .nest-card { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
        .nest-card:hover { background: #f8f9fa; border-left: 4px solid #3498db; }
        .nest-card strong { display: block; color: #2c3e50; font-size: 14px; }
        .nest-card span { font-size: 12px; color: #7f8c8d; }

        .legend { background: white; padding: 10px; position: absolute; bottom: 30px; right: 20px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.2); z-index: 1; border: 1px solid #ddd; }
        .legend div { display: flex; align-items: center; margin-bottom: 5px; font-size: 12px; font-weight: bold; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; border: 1px solid #333; }
        
        .nest-marker { cursor: pointer; border: 2px solid white; border-radius: 50%; width: 22px; height: 22px; box-shadow: 0 0 10px rgba(0,0,0,0.4); transition: transform 0.2s; }
        .nest-marker:hover { transform: scale(1.2); }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <h2 style="margin:0; font-size: 18px;">Wing Nest Platform</h2>
    </div>
    <div class="sidebar-content">
        <div class="filter-group">
            <label style="font-size: 12px; font-weight: bold; color: #95a5a6; text-transform: uppercase;">Filter by State</label>
            <select id="stateSelect">
                <option value="all">Show All States</option>
            </select>
        </div>
        <div id="nestList">
            <p style="text-align:center; color:#95a5a6; margin-top:50px;">Fetching live data from Google...</p>
        </div>
    </div>
</div>

<div id="map"></div>

<div class="legend">
    <div><span class="dot" style="background: #2ecc71;"></span> Active Nest</div>
    <div><span class="dot" style="background: #3498db;"></span> Scheduled Nest</div>
    <div><span class="dot" style="background: #e74c3c;"></span> FAA Airport/Heliport</div>
</div>

<script>
    const ACCESS_TOKEN = 'pk.eyJ1Ijoiam1hdGxiMTcyIiwiYSI6ImNtbWI3NG14ZDBtc20ycG9sZGVwZWhsZmYifQ.NBMR1a8v6ADtwFlTNZlgJw';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyBJflyAq5hg0MhQ1UNH79H3kBL7rZG4IDQQv8xQqq7HVOPy_B21KJRt2CiZBmGDq4VBg/exec';

    mapboxgl.accessToken = ACCESS_TOKEN;

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/satellite-streets-v12',
        center: [-84.3880, 33.7490],
        zoom: 7
    });

    let faaData = null;
    let allNests = [];
    let currentMarkers = [];

    map.on('load', () => {
        // 1. Fetch FAA Airport Data
        fetch('https://services6.arcgis.com/ssUayPoYpobmXvAe/arcgis/rest/services/US_Airport_Facilities/FeatureServer/0/query?outFields=FULLNAME&where=1%3D1&f=geojson')
            .then(r => r.json()).then(data => {
                faaData = data;
                map.addSource('faa', { type: 'geojson', data: data });
                map.addLayer({
                    'id': 'faa-layer',
                    'type': 'circle',
                    'source': 'faa',
                    'paint': {
                        'circle-radius': 4.5,
                        'circle-color': '#e74c3c',
                        'circle-stroke-width': 1,
                        'circle-stroke-color': '#fff'
                    }
                });
            });

        // 2. Fetch Live Google Sheet Data
        fetch(SCRIPT_URL)
            .then(r => r.json())
            .then(data => {
                allNests = data;
                populateStates(data);
                renderNests('all');
            })
            .catch(err => {
                document.getElementById('nestList').innerHTML = '<p style="color:red;">Error connecting to Google Script.</p>';
            });
    });

    function populateStates(data) {
        const states = [...new Set(data.map(n => n.State).filter(s => s))].sort();
        const select = document.getElementById('stateSelect');
        states.forEach(state => {
            const opt = document.createElement('option');
            opt.value = state;
            opt.innerHTML = state;
            select.appendChild(opt);
        });
        select.addEventListener('change', (e) => renderNests(e.target.value));
    }

    function renderNests(selectedState) {
        // Clear old markers
        currentMarkers.forEach(m => m.remove());
        currentMarkers = [];
        
        const listContainer = document.getElementById('nestList');
        listContainer.innerHTML = '';
        const bounds = new mapboxgl.LngLatBounds();

        allNests.forEach(nest => {
            const lat = parseFloat(nest.Latitude);
            const lng = parseFloat(nest.Longitude);
            const name = nest.Nest_Name || "Nest";
            const state = nest.State || "Unknown";
            const status = nest.Status || "Active";

            if (isNaN(lat) || isNaN(lng)) return;
            if (selectedState !== 'all' && state !== selectedState) return;

            bounds.extend([lng, lat]);

            // Add Map Marker
            const el = document.createElement('div');
            el.className = 'nest-marker';
            el.style.backgroundColor = status === 'Active' ? '#2ecc71' : '#3498db';
            
            const marker = new mapboxgl.Marker(el).setLngLat([lng, lat]).addTo(map);
            currentMarkers.push(marker);

            // Add Sidebar Card
            const card = document.createElement('div');
            card.className = 'nest-card';
            card.innerHTML = `<strong>${name}</strong><span>${state} | ${status}</span>`;
            card.onclick = () => {
                map.flyTo({ center: [lng, lat], zoom: 12 });
                runConflictScan([lng, lat], name);
            };
            listContainer.appendChild(card);

            el.onclick = () => runConflictScan([lng, lat], name);
        });

        if (!bounds.isEmpty()) map.fitBounds(bounds, { padding: 80 });
    }

    function runConflictScan(coords, name) {
        // Remove old scan circle
        if (map.getLayer('scan-zone')) {
            map.removeLayer('scan-zone');
            map.removeSource('scan-zone');
        }

        // Draw 6-mile radius
        const circle = turf.circle(coords, 6, {units: 'miles'});
        map.addSource('scan-zone', { type: 'geojson', data: circle });
        map.addLayer({
            'id': 'scan-zone',
            'type': 'fill',
            'source': 'scan-zone',
            'paint': { 'fill-color': '#f1c40f', 'fill-opacity': 0.3 }
        });

        // Count Conflicts
        let conflicts = 0;
        if (faaData) {
            faaData.features.forEach(f => {
                const dist = turf.distance(coords, f.geometry.coordinates, {units: 'miles'});
                if (dist <= 6) conflicts++;
            });
        }

        new mapboxgl.Popup()
            .setLngLat(coords)
            .setHTML(`<div style="font-family:sans-serif; padding:5px;">
                        <strong style="color:#2c3e50;">${name}</strong><br>
                        <hr style="border:0; border-top:1px solid #eee;">
                        6-Mile Scan Results:<br>
                        <b style="color:#e74c3c; font-size:16px;">${conflicts}</b> FAA Conflicts
                      </div>`)
            .addTo(map);
    }
</script>
</body>
</html>
